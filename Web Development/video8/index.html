<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline and Block Elements - HTML</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>This is a paragraph. It is a block-level element.</p>
    <a href="https://www.google.com">This is a link. It is an inline element.</a>
    <div>This is a div. It is a block-level element.</div>
    <span>This is a span. It is an inline element.</span>
    <a href="">Another link. It is also an inline element.</a>
</body>
</html>
